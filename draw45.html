<html>
	<head>
		<title>draw45</title>
		<meta charset="utf-8"><!-- 避免亂碼 -->
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<!-- 小螢幕等比例放大, 轉橫向時再依寬度放大-->
		<meta name="language" content="tw">		<!-- 希望不會詢問是否翻譯 -->

		
		
<style>
html,
body {
	border: none;
	margin: 0;
	padding: 0;
}
</style>

  <script ></script>
  <script>   </script>
</head>
<body>
<canvas id="canvas" ></canvas>
</body>
<script>
var canvas = document.getElementById("canvas");
    canvas.addEventListener('mousedown',mouseDown);
	canvas.addEventListener('mousemove',mouseMove);
	canvas.addEventListener('mouseup',mouseUp);
	
	canvas.addEventListener('touchstart',touchStart);
    canvas.addEventListener('touchmove',touchMove);
    canvas.addEventListener('touchend',touchEnd);

	canvas.width = 950;canvas.height = 850;		//寬高預設值為300×150
	// canvas.width = Window.width;canvas.height = Window.height;		//寬高預設值為300×150
	
	
	var ctx = canvas.getContext("2d");
	var enGestures=false;
	const r=10;
const r2=r*2;
	// ctx.beginPath();
	// ctx.moveTo(100, 200);
		// ctx.fillStyle = "black";	//填滿色
	// ctx.fillRect(0,0,canvas.width,canvas.height);
	// ctx.strokeStyle = "blue";	//線條色
	// ctx.lineWidth = 2;	//線條粗度
	ctx.strokeRect(5,5,canvas.width-10,canvas.height-10);	//外框
	// ctx.strokeRect(canvas.width/3,canvas.height/3,canvas.width/3,canvas.height/3);//內框
	
	function mouseDown(e){
		gesturesStart(e.pageX, e.pageY);
		e.preventDefault();
	}
	
	function touchStart(e){
		gesturesStart(e.targetTouches[0].pageX,e.targetTouches[0].pageY);
		e.preventDefault();			//停止事件的默認動作
		// e.stopPropagation();		//阻止事件冒泡
	}

	function gesturesStart(x,y){
		// alert(x,y);
		enGestures = true;
		ctx.strokeStyle = "green";	//線條色
		ctx.lineWidth = "1";	//線條粗度
		ctx.beginPath();
		ctx.arc(~~((x+r)/r2)*r2, ~~((y+r)/r2)*r2,r,0,Math.PI*2,true);
		ctx.stroke();
	}
	
	function mouseMove(e){
		gesturesMove(e.pageX,e.pageY);
		e.preventDefault();
	}
	function touchMove(e){
		gesturesMove(e.targetTouches[0].pageX,e.targetTouches[0].pageY);
		e.preventDefault();
	}

function gesturesMove(x, y){

	if(enGestures){
				ctx.strokeStyle = "blue";	//線條色
	ctx.lineWidth = "1";	//線條粗度
	ctx.beginPath();
	
    ctx.arc(~~((x+r)/r2)*r2, ~~((y+r)/r2)*r2,r,0,Math.PI*2,true);
	ctx.stroke();

	 }
}
	
	function mouseUp(e){
		gesturesEnd();
		e.preventDefault();
	}
	function touchEnd(e){
	gesturesEnd();
	e.preventDefault();
}
	
	function gesturesEnd(){
		if(enGestures){
			enGestures = false;
		}
	}
	

</script>
</html>
