	/*畫十字線(準星/瞄準線)*/
	function drawCross(e){
		let cvs = e.target;
		let ctx = cvs.getContext("2d");
		let x0 = e.pageX;
		let y0 = e.pageY - cvs.getBoundingClientRect().top;
		let c0 = dmWidth * 1.414 * 3 / 2
			ctx.clearRect(0,0, cvs.width, cvs.height);
			ctx.beginPath();
			ctx.moveTo(x0,0);
			ctx.lineTo(x0, y0-c0);
			
			ctx.moveTo(x0, y0+c0);
			ctx.lineTo(x0, cvs.height);
			
			ctx.moveTo(0, y0);
			ctx.lineTo(x0-c0, y0);
			
			ctx.moveTo(x0+c0, y0);
			ctx.lineTo(cvs.width, y0);
			ctx.closePath();
			ctx.stroke();
	}
	/*畫白格線*/
	function drawGrid(){

		let r1 = dmWidth * 1.414;
		let r5 = r1*5;
		let w9 = Math.max(canvas.width, canvas.height);	//依較長邊畫正方形範圍
		w9 = (Math.trunc(w9/r5)+1) *r5;	//畫布長寬取格寬的整數
		
				ctx.lineWidth = 0.5;	//線條粗度
			ctx.strokeStyle = "Silver";	//框線顏色
			ctx.setLineDash([2, 4]);
	for(let id = 1;id<6;id+=4){
		for(let xa = 0; xa<w9; xa+=(r1*id)){
			ctx.beginPath();
			ctx.moveTo(xa, 0);
			ctx.lineTo(w9, w9 - xa);			
			ctx.moveTo(xa, 0);
			ctx.lineTo(0, xa);
			ctx.moveTo(xa, w9);
			ctx.lineTo(0, w9-xa);
			ctx.moveTo(xa, w9);
			ctx.lineTo(w9, xa);
			ctx.closePath();

			ctx.stroke();
		}
		ctx.lineWidth = 1.5;
		ctx.setLineDash([]);
	}

		
		

	}
	
	
	function drawDiamond(x0, y0, sftx=0,sfty=0){
			// console.log("ddm:",x0,y0);
		let border = .5;	//間隔用比例可否?		 
		let r3 = dmWidth /sqrt2 + border;
		ctx.beginPath();
		ctx.moveTo(x0, y0-r3);	//上方
		ctx.lineTo(x0+r3, y0);
		ctx.lineTo(x0, y0+r3);
		ctx.lineTo(x0-r3, y0);
		ctx.closePath();
		
		ctx.fillStyle = "gray";	//填滿色
		ctx.fill();
		
		if(document.getElementById("check1").checked){
			ctx.lineWidth = 1.5;	//線條粗度
			 ctx.strokeStyle = "Silver";	//框線條色
			 ctx.stroke();
		}
	}
	

function drawCircle(x, y,r=4,r2=8,w=1, c="black"){	
			ctx.strokeStyle = c;	//線條色
		ctx.lineWidth = w;	//線條粗度
		ctx.beginPath();	

		
		y= ~~((y+r)/r2);
		y*= r2;
				x = ~~((x+r)/r2);
		x *= r2;

	
	ctx.rect(x-r,y-r,r*2,r*2);

tools.getXYbyRC = function(raw, col){  //列行值轉座標
	let r = dmWidth/sqrt2;
	let r2=r*2;
	let sftx = raw%2 * r;	//奇數行向右偏移
	let x0= col * r2 - r+ sftx;
	let y0 = raw *r;

	let result={};
	result.x = x0;
	result.y = y0;
	return result;
}

tools.getColRaw=function(x0, y0){  //座標轉列行值

	let r = dmWidth/sqrt2;
	let col = Math.trunc((x0+r/3)/r);
	col = Math.trunc((x0+r/3)/(r*2)) + col%2;
	
	//col奇數時,y0要加偏移值
	let raw = Math.trunc((y0+r/3)/r) ;
		let result={};
	result.col = col;
	result.raw = raw;
	return result;
}

tools.rotate45 = function(x, y, w){
	let x0=x,y0=y;
	let x1,y1;
//順轉45度後的座標
	let v = 1;
	if(x0 > y0){
		y1 = (y0-x0)/sqrt2;	//y為負值
		x1 = (x0 +y0)/ sqrt2;
		v = -1;	//改為Math.sign(y0-x0);
	}else{
		y1 = (y0-x0)/sqrt2;
		x1 = (y0 + x0)/sqrt2;
	}
	//取整數格
	x1 = Math.trunc(x1/w);
	x1 *= w;
	x1 += w/2;
	
	y1 = Math.trunc(y1/w);
	y1 *= w ;
	y1 += v * w/2;			
	// console.log(col,raw);
	//再轉回來
	if(y1 <0){
		x0 = (x1-y1) / sqrt2;
		y0 = (x1+y1)/sqrt2;
	}else{
		x0=(x1-y1)/sqrt2;
		y0=(x1+y1)/sqrt2;
	}

	let tar = {};
	tar.x = x0;
	tar.y = y0;
	return tar;
}

	let content =  JSON.stringify(aArray);

	content = content.replaceAll("null", "0");	//陣列在json的空元素為null,置換以縮小檔案
	// 1. 建立 Blob 物件 (內容, 類型)
  const blob = new Blob([content], { type: 'text/plain' });
  // 2. 建立下載連結
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);  
  a.download = fileName; // 設定檔名

  // 3. 模擬點擊並移除
  a.click();
  URL.revokeObjectURL(a.href); // 釋放記憶體
}
