<html>
	<head>
		<title>draw45</title>
		<meta charset="utf-8"><!-- 避免亂碼 -->
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<!-- 小螢幕等比例放大, 轉橫向時再依寬度放大-->
		<meta name="language" content="tw">		<!-- 希望不會詢問是否翻譯 -->

		
		
<style>
html,
body {
	border: none;
	margin: 0;
	padding: 0;
}
</style>

  <script ></script>
  <script>   </script>
</head>
<body>
<canvas id="canvas" ></canvas>
</body>
<script>
var canvas = document.getElementById("canvas");
    canvas.addEventListener('mousedown',mouseDown);
	canvas.addEventListener('mousemove',mouseMove);
	canvas.addEventListener('mouseup',mouseUp);
	
	canvas.addEventListener('touchstart',touchStart);
    canvas.addEventListener('touchmove',touchMove);
    canvas.addEventListener('touchend',touchEnd);

	// canvas.width = 950;canvas.height = 850;		//寬高預設值為300×150
	canvas.height = window.innerHeight;
canvas.width = window.innerWidth;
	// canvas.width = Window.width;canvas.height = Window.height;		//寬高預設值為300×150
	
	
	var ctx = canvas.getContext("2d");
	var enGestures=false;
	// ctx.rotate((Math.PI / 180) * 45);//轉畫布


	// ctx.beginPath();
	// ctx.moveTo(0, 0);
			// ctx.lineTo(100,100);
	// ctx.stroke();
		// ctx.fillStyle = "black";	//填滿色
	// ctx.fillRect(0,0,canvas.width,canvas.height);
	// ctx.strokeStyle = "blue";	//線條色
	// ctx.lineWidth = 2;	//線條粗度
	ctx.strokeRect(5,5,canvas.width-10,canvas.height-10);	//外框
	// ctx.strokeRect(canvas.width/3,canvas.height/3,canvas.width/3,canvas.height/3);//內框
	
	function mouseDown(e){
		gesturesStart(e.pageX, e.pageY);
		e.preventDefault();
	}
	
	function touchStart(e){
		gesturesStart(e.targetTouches[0].pageX,e.targetTouches[0].pageY);
		e.preventDefault();			//停止事件的默認動作
		// e.stopPropagation();		//阻止事件冒泡
	}

	function gesturesStart(x,y){
		enGestures = true;
		// drawDiamond(x, y);
		drawCircle(x, y);
	}
	

	
	function mouseMove(e){
		gesturesMove(e.pageX,e.pageY);
		e.preventDefault();
	}
	function touchMove(e){
		gesturesMove(e.targetTouches[0].pageX,e.targetTouches[0].pageY);
		e.preventDefault();
	}

function gesturesMove(x, y){

	if(enGestures){		
		drawCircle(x,y);

	 }
}
	
	function mouseUp(e){
		gesturesEnd();
		e.preventDefault();
	}
	function touchEnd(e){
	gesturesEnd();
	e.preventDefault();
}
	
	function gesturesEnd(){
		if(enGestures){
			enGestures = false;
		}
	}
	
	// drawDiamond(100,100);
	// drawDiamond(69,100);
	function drawDiamond(x0, y0){
			
			
					ctx.strokeStyle = "green";	//線條色
		ctx.lineWidth = "1";	//線條粗度
		ctx.fillStyle = "black";	//填滿色
		 ctx.arc(x0,y0,2,0,Math.PI*2);
		 ctx.stroke();
			
			
				let str="a(" +x0+"," +y0+")";
			// let r2=r*1.414;	//間隔
			let x1,y1;
//順轉45度後的座標
if(x0 > y0){
	y1 = (y0-x0)/1.414;	//y為負值
	x1 = (x0 +y0)/ 1.414;
	// x1 -= y1;
}else{
	y1 = (y0-x0)/1.414;
	x1 *= 1.414;
	x1 += y1;
}
str += "b[" + ~~x1 +"," + ~~y1 +"]";
			let w=50;	//間隔
		x1 = ~~(x1/w);
		// xx = x%2;
		// x *= 2;
		x1 *=w;
		x1 += w/2;
		
		y1 = ~~(y1/w);
		// yy=y%2;
		// if(!xx && !yy)return;
		// y = ~~(y/2);
		// y *=2;
		y1 *= w ;
		y1 += w/2;
		str += "c[" + ~~x1 +"," + ~~y1 +"]";
		//再轉回來
		if(y1 <0){
			y0 = (x1+y1)/1.414;
			x0 = x1 * 1.414 + y1;
		}else{
			x0=(x1-y1)/1.414;
			y0=(x1+y1)/1.414;
		}
		// x /=1.414;
		// y /=1.414;
		// ctx.arc(x0,y0,1,0,Math.PI*2,true);
		str += "d[" + ~~x0 +"," + ~~y0 +"]";
		console.log(str);


		
		let gap = 0;
		let r3 =w/1.414 - gap;
		ctx.beginPath();
		ctx.moveTo(x0-r3, y0);	
		// ctx.lineTo(x0-r3, y0);	//菱形上方
		ctx.lineTo(x0, y0+r3);	//右
		ctx.lineTo(x0+r3, y0);	//下
		ctx.lineTo(x0, y0-r3);		//左
		ctx.closePath();
		// ctx.arc(x, y,r,0,Math.PI*2,true);
		ctx.stroke();
	}
		function drawDiamond_(x, y){
			enGestures = true;
			drawCircle(x,y);
				let str="(" +x+"," +y+")";
			// let r2=r*1.414;	//間隔
//轉45度後的距離
			x *=1.414;
			y *=1.414;
			 // r2*=1.414;

			let w=50;	//間隔
		x = ~~(x/w);
		// xx = x%2;
		// x *= 2;
		x *=w;
		x	+= w/2;
		
		y = ~~(y/w);
		// yy=y%2;
		// if(!xx && !yy)return;
		// y = ~~(y/2);
		// y *=2;
		y *= w ;
		y += w/2;
		
		x /=1.414;
		y /=1.414;
		drawCircle(x,y,1,1,1,"red");
		str += "[" + ~~x +"," + ~~y +"]";
		console.log(str);

		ctx.strokeStyle = "green";	//線條色
		ctx.lineWidth = "1";	//線條粗度
		ctx.fillStyle = "black";	//填滿色
		ctx.beginPath();
		let gap = 5;
		let r3 =w/1.414 - gap;
		ctx.moveTo(x-r3, y);	//菱形上方
		ctx.lineTo(x, y+r3);	//右
		ctx.lineTo(x+r3, y);	//下
		ctx.lineTo(x, y-r3);		//左
		ctx.closePath();
		// ctx.arc(x, y,r,0,Math.PI*2,true);
		ctx.stroke();
	}

function drawCircle(x, y,r=4,r2=8,w=1, c="black"){	
			ctx.strokeStyle = c;	//線條色
		ctx.lineWidth = w;	//線條粗度
		ctx.beginPath();	

		
		y= ~~((y+r)/r2);
		y*= r2;
				x = ~~((x+r)/r2);
		x *= r2;

	
	ctx.rect(x-r,y-r,r*2,r*2);
		// ctx.arc(x,y,r,0,Math.PI*2,true);
ctx.fill();
}
</script>
</html>
