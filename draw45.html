	function drawDiamond(x0, y0, sftx=0,sfty=0){
			// console.log("ddm:",x0,y0);
		let border = 1;
		let r3 = dmWidth /sqrt2 - border;
		ctx.beginPath();
		ctx.fillStyle = "black";	//填滿色
		ctx.moveTo(x0, y0-r3);
		ctx.lineTo(x0+r3, y0);
		ctx.lineTo(x0, y0+r3);
		ctx.lineTo(x0-r3, y0);
		ctx.closePath();
ctx.globalCompositeOperation ="xor";		//預設值"source-over"
		ctx.fill();
		ctx.globalCompositeOperation ="source-over";		//預設值"source-over"
	}

var tools={};
tools.getXYbyRC = function(raw, col){  //列行值轉座標
	let r = dmWidth/sqrt2;
	let r2=r*2;
	let sftx = raw%2 * r;	//奇數行向右偏移
	let x0= col * r2 - r+ sftx;
	let y0 = raw *r;

	let result={};
	result.x = x0;
	result.y = y0;
	return result;
}

tools.getColRaw=function(x0, y0){  //座標轉列行值

	let r = dmWidth/sqrt2;
	let col = Math.trunc((x0+r/3)/r);
	col = Math.trunc((x0+r/3)/(r*2)) + col%2;
	
	//col奇數時,y0要加偏移值
	let raw = Math.trunc((y0+r/3)/r) ;
		let result={};
	result.col = col;
	result.raw = raw;
	return result;
}

	// console.log("RC=",raw,col,aArray[raw][col]);
}

tools.rotate45 = function(x, y, w){
	let x0=x,y0=y;
	let x1,y1;
//順轉45度後的座標
	let v = 1;
	if(x0 > y0){
		y1 = (y0-x0)/sqrt2;	//y為負值
		x1 = (x0 +y0)/ sqrt2;
		v = -1;	//改為Math.sign(y0-x0);
	}else{
		y1 = (y0-x0)/sqrt2;
		x1 = (y0 + x0)/sqrt2;
	}
	//取整數格
	x1 = Math.trunc(x1/w);
	x1 *= w;
	x1 += w/2;
	
	y1 = Math.trunc(y1/w);
	y1 *= w ;
	y1 += v * w/2;			
	// console.log(col,raw);
	//再轉回來
	if(y1 <0){
		x0 = (x1-y1) / sqrt2;
		y0 = (x1+y1)/sqrt2;
	}else{
		x0=(x1-y1)/sqrt2;
		y0=(x1+y1)/sqrt2;
	}

	let tar = {};
	tar.x = x0;
	tar.y = y0;
	return tar;
}

tools.saveFile = function (fileName="1234.dm1") {
	let content =  JSON.stringify(aArray);
	localStorage.setItem("dmdArr",content);	//暫存編輯資料
	
	// 1. 建立 Blob 物件 (內容, 類型)
  const blob = new Blob([content], { type: 'text/plain' });
  // 2. 建立下載連結
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);  
  a.download = fileName; // 設定檔名

  // 3. 模擬點擊並移除
  a.click();
  URL.revokeObjectURL(a.href); // 釋放記憶體
}
