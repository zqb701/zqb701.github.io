<script>
/*
依滑鼠座標畫菱形格(轉45度取整數為中心點再轉正)
菱形格清除(xor模式), 邊界沒清除.
離線
背景,
格點,寬度,

*/
var canvas = document.getElementById("canvas");
var cvs2 = document.getElementById("canvas2");
var gui = {};



	canvas.width = 300;
	canvas.height = 300;
	cvs2.height = 300;
	var dmWidth =  30;
	// canvas.height = window.innerHeight;
	// canvas.width = window.innerWidth;
	
	
	
	var ctx = canvas.getContext("2d");
	var ctx2 = cvs2.getContext("2d");	//底圖
	ctx.globalCompositeOperation ="xor";		//預設值"source-over"
	
	var enGestures=false;
	// ctx.rotate((Math.PI / 180) * 45);//轉畫布


	// ctx.beginPath();
	// ctx.moveTo(0, 0);
			// ctx.lineTo(300,300);
// ctx.closePath();			
	// ctx.stroke();
	ctx.strokeRect(5,5,canvas.width-10,canvas.height-10);	//外框
	ctx2.strokeRect(5,5,canvas.width-10,canvas.height-10);	//外框
		// ctx.fillStyle = 'silver'
	 // ctx.fillRect(0,0,150,150);
	// ctx.strokeRect(300,100,100,100);	//外框
	// drawDiamond(300,100);
	// drawDiamond(100,300);
		// ctx.fillStyle = "black";	//填滿色
	// ctx.fillRect(0,0,canvas.width,canvas.height);
	// ctx.strokeStyle = "blue";	//線條色
	// ctx.lineWidth = 2;	//線條粗度
	
	// ctx.strokeRect(canvas.width/3,canvas.height/3,canvas.width/3,canvas.height/3);//內框
	
	gui.mouseDown = function (e){
		e.preventDefault();
		e.stopPropagation();
		gesturesStart(e.offsetX, e.offsetY);
	}
	
	function touchStart(e){
		gesturesStart(e.targetTouches[0].pageX,e.targetTouches[0].pageY);
		e.preventDefault();			//停止事件的默認動作
		// e.stopPropagation();		//阻止事件冒泡
	}

	function gesturesStart(x,y){
		enGestures = true;
		let tar = tools.rotate45(x, y, dmWidth);
		drawDiamond(tar.x, tar.y);
			oldX = tar.x;
			oldY = tar.y;
	}
	

	
	function mouseMove(e){
		gesturesMove(e.offsetX, e.offsetY);
		e.preventDefault();
	}
	
	function touchMove(e){
		gesturesMove(e.targetTouches[0].pageX,e.targetTouches[0].pageY);
		e.preventDefault();
	}

let oldX,oldY;
function gesturesMove(x, y){

	if(enGestures){
		let tar = tools.rotate45(x, y, dmWidth);
		if(tar.x == oldX && tar.y == oldY){
			
		}else{
			drawDiamond(tar.x, tar.y);
			oldX = tar.x;
			oldY = tar.y;
		}
	 }
}
	
	function mouseUp(e){
		gesturesEnd();
		e.preventDefault();
	}
	function touchEnd(e){
	gesturesEnd();
	e.preventDefault();
}
	
	function gesturesEnd(){
		if(enGestures){
			enGestures = false;
		}
	}
	
	// drawDiamond(100,100);
	// drawDiamond(69,100);
	function drawDiamond(x0, y0){

		let gap = 1;
		let r3 = dmWidth /1.414 - gap;
		ctx.beginPath();
		ctx.fillStyle = "black";	//填滿色
		// ctx.moveTo(x0, y0);	
		ctx.moveTo(x0, y0-r3);
		ctx.lineTo(x0+r3, y0);
		ctx.lineTo(x0, y0+r3);
		ctx.lineTo(x0-r3, y0);
		ctx.closePath();
		// ctx.arc(x, y,r,0,Math.PI*2,true);
		ctx.fill();
	}
		function drawDiamond_(x, y){
			enGestures = true;
			drawCircle(x,y);
				let str="(" +x+"," +y+")";
			// let r2=r*1.414;	//間隔
//轉45度後的距離
			x *=1.414;
			y *=1.414;
			 // r2*=1.414;

			let w=50;	//間隔
		x = ~~(x/w);
		// xx = x%2;
		// x *= 2;
		x *=w;
		x	+= w/2;
		
		y = ~~(y/w);
		// yy=y%2;
		// if(!xx && !yy)return;
		// y = ~~(y/2);
		// y *=2;
		y *= w ;
		y += w/2;
		
		x /=1.414;
		y /=1.414;
		drawCircle(x,y,1,1,1,"red");
		str += "[" + ~~x +"," + ~~y +"]";
		console.log(str);

		ctx.strokeStyle = "green";	//線條色
		ctx.lineWidth = "1";	//線條粗度
		ctx.fillStyle = "black";	//填滿色
		ctx.beginPath();
		let gap = 5;
		let r3 =w/1.414 - gap;
		ctx.moveTo(x-r3, y);	//菱形上方
		ctx.lineTo(x, y+r3);	//右
		ctx.lineTo(x+r3, y);	//下
		ctx.lineTo(x, y-r3);		//左
		ctx.closePath();
		// ctx.arc(x, y,r,0,Math.PI*2,true);
		ctx.stroke();
	}

function drawCircle(x, y,r=4,r2=8,w=1, c="black"){	
			ctx.strokeStyle = c;	//線條色
		ctx.lineWidth = w;	//線條粗度
		ctx.beginPath();	

		
		y= ~~((y+r)/r2);
		y*= r2;
				x = ~~((x+r)/r2);
		x *= r2;

	
	ctx.rect(x-r,y-r,r*2,r*2);
		// ctx.arc(x,y,r,0,Math.PI*2,true);
ctx.fill();
}

drawText();
function drawText(){
	ctx2.font = "300px sans-serif" //設定文字字型 大小
	ctx2.fillStyle="#00A0E9" //設定文字填滿顏色
	// ctx.strokeStyle="#D50A17" //設定文字邊框
	// ctx.strokeText("好像快沒梗", 10, 150) //邊框文字

	let textWidth=ctx2.measureText("永").width //測量文字寬度
	let textHeight=ctx2.measureText("永").height //測量文字高度
	console.log(textWidth,textHeight);
	ctx2.fillText("永", 0, 250)  //填滿文字, 座標從左下角起算
}

var tools={};
tools.clearDiamond = function(x, y){
	
}
tools.rotate45 = function(x, y, w){
				let x0=x,y0=y;
				let x1,y1;
//順轉45度後的座標
let v = 1;
if(x0 > y0){
	y1 = (y0-x0)/1.414;	//y為負值
	x1 = (x0 +y0)/ 1.414;
	v = -1;
}else{
	y1 = (y0-x0)/1.414;
	x1 = (y0 + x0)/1.414;
}

// str += "b1[" + ~~x1 +"," + ~~y1 +"]";

		x1 = Math.trunc(x1/w);
		// xx = x%2;
		// x *= 2;
		x1 *=w;
		x1 += w/2;
		
		y1 = Math.trunc(y1/w);
		// yy=y%2;
		// if(!xx && !yy)return;
		// y = ~~(y/2);
		// y *=2;
		y1 *= w ;
		// if(y1<0){
			// y1 -= w/2;
		// }else{
			y1 += v * w/2;			
		// }
		// str += "b2[" + ~~x1 +"," + ~~y1 +"]";
		//再轉回來
		if(y1 <0){
			x0 = (x1-y1) / 1.414;
			y0 = (x1+y1)/1.414;
		}else{
			x0=(x1-y1)/1.414;
			y0=(x1+y1)/1.414;
		}
		let tar = {};
		tar.x = x0;
		tar.y = y0;
	return tar;
}

    canvas.addEventListener('mousedown', gui.mouseDown);
	canvas.addEventListener('mousemove',mouseMove);
	canvas.addEventListener('mouseup',mouseUp);
	
	canvas.addEventListener('touchstart',touchStart);
    canvas.addEventListener('touchmove',touchMove);
    canvas.addEventListener('touchend',touchEnd);
</script>
