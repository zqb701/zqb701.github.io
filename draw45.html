let oldX,oldY;
gui.gesturesMove=function (x, y){

	tools.hidctl();



	// let delay = Date.now() - clickTime;
	if(!isMove && new Date() - clickTime >200){	//0.2з§’йӮ„жІ’й–Ӣе§Ӣз•«,е°ұдёҚзөҰз•«дәҶ
		enGestures = false;
		return;
	}else{
			isMove = true;
	}
	
	if(!enGestures){
		return;
	}
	// console.log(enGestures);

	if(pen<2){		//з•«й»һжҲ–жё…й»һ
		
		// let rect = canvas.getBoundingClientRect();
		let tar = tools.rotate45(x - rect.left, y - rect.top, dmWidth);
		
		if(tar.x == oldX && tar.y == oldY){
					//ж»‘йј еңЁеҗҢдёҖж јзҜ„еңҚе…§з§»еӢ•еүҮдёҚеҶҚз№ӘиЈҪ(ж”№з”ЁеҲ—иЎҢијғдҪі)
		}else{
			
			let theCR = tools.getColRaw(tar.x, tar.y);

				if(pen ==0){
					if(!aArray[theCR.raw] ||!aArray[theCR.raw][theCR.col] ){	//з•«й»һ
						tools.setArr(theCR);
						draw.diamond(tar.x, tar.y);
					}
				}
				if(pen ==1){
					if(aArray[theCR.raw] && aArray[theCR.raw][theCR.col] ){	//жё…йҷӨ
						aArray[theCR.raw][theCR.col] = null;
						ctx.globalCompositeOperation = "destination-out";		//й җиЁӯеҖј"source-over",еҸҰxor
						draw.diamond(tar.x, tar.y);
						ctx.globalCompositeOperation ="source-over";		//й җиЁӯеҖј"source-over"
					}
				}
			oldX = tar.x;
			oldY = tar.y;
		}
	 }
	 
	 if(pen == 2){	//еә•ең–
						// cvs2.style.position = "fixed";
					isMove = true;
					// x0 -= canvas.getBoundingClientRect().x;
					let rect2 = cvs2.getBoundingClientRect();
					if(event.ctrlKey || 
						document.getElementById("inlineRadio2").checked
					){	 //дёҠзё®дёӢж”ҫ, иҰҒжҢүctrl
						let z =  (y - mouseY)/100;
						// console.log(z);
						let newW = rect2.width * (1-z);	
						let newH = rect2.height * (1-z);
						if(newW > 30 && newH > 30){	//зҰҒжӯўзё®еӨӘе°Ҹ(йӮЈж”ҫеӨӘеӨ§???)
							cvs2.style.left = rect2.x +rect2.width * z/2;		//йҖЈеӢ•е·ҰдёҠи§’,жҠҠдёӯеӨ®з•¶зё®ж”ҫдёӯеҝғ
							cvs2.style.top = rect2.y +rect2.height *z/2;
							cvs2.style.width = newW;
							cvs2.style.height = newH;
						}
					}
					
					if(document.getElementById("inlineRadio1").checked){	//з§»еӢ•
						// let rect2 = cvs2.getBoundingClientRect();
						let rectTag = cvs3.getBoundingClientRect();
						let newX = rect2.x +(x - mouseX);
						let newY = rect2.y +(y - mouseY);
						
						//дёҚеҸҜз§»еҮәй Ғйқўе…§з·Ј30pxд»ҘеӨ–
						if(newX < (rectTag.right-30) && (newX+rect2.width) > (rectTag.left + 30)){
							cvs2.style.left = newX;
						}
						
						if(newY < (rectTag.bottom - 30) && (newY+rect2.height) > (rectTag.top + 30)){
							cvs2.style.top = newY;
						}
					}
					
	if(document.getElementById("inlineRadio3").checked){	//ж—ӢиҪү
							/*
		ж—ӢиҪүдёӯеҝғ transform-originпјҢй җиЁӯзӮәе…ғд»¶дёӯеҝғй»һ
		еӢ•з•«ж•Ҳжһң box.style.transition = 'transform 0.5s ease-in-out';
		*/
						
			degBG += y - mouseY;
			if(degBG > 360){
				degBG -= 360;
			}
			if(degBG < 0){
				degBG += 360;
			}				
			cvs2.style.transform ="rotate("+ degBG +"deg)";		//и§’еәҰжҳҜзө•еҖјд»Ҙи®Ҡж•ёдҝқеӯҳ,еҫҢйқўиҰҒжңүгҖҢdegгҖҚзӮәе–®дҪҚ
		}
			mouseX = x;
			mouseY = y;
	}	 
}

gui.gesturesEnd=function (x, y){
	if(enGestures){
		enGestures = false;
	}
	if(isMove){		//з§»еӢ•йҒҺ,ж”ҫй–Ӣе°ұдёҚз•«
			return;
	}

	let delay =  Date.now() - clickTime;
	if(delay < 200){		//з•«е–®й»һ
		let tar = tools.rotate45(x - rect.left, y - rect.top, dmWidth);
		let theCR = tools.getColRaw(tar.x, tar.y);
		
		if(pen ==0){
			if(!aArray[theCR.raw] ||!aArray[theCR.raw][theCR.col] ){	//з•«й»һ
				tools.setArr(theCR);
				draw.diamond(tar.x, tar.y);
			}
		}
		
		if(pen ==1){
			if(aArray[theCR.raw] && aArray[theCR.raw][theCR.col] ){	//жё…йҷӨ
				ctx.globalCompositeOperation = "destination-out";		//й җиЁӯеҖј"source-over",еҸҰxor
				aArray[theCR.raw][theCR.col] = undefined;
				draw.diamond(tar.x, tar.y);
				ctx.globalCompositeOperation ="source-over";		//й җиЁӯеҖј"source-over"
			}
		}
		oldX = tar.x;
		oldY = tar.y;
	}else{
		// cmdPanel.style.left = x + canvas.getBoundingClientRect().left;
		// cmdPanel.style.top = y + canvas.getBoundingClientRect().top;

			ctx.reset();

			x0 = cnt.x;
			y0 = cnt.y;			
			
			ctx.beginPath();
			ctx.moveTo(x0,0);
			ctx.lineTo(x0, y0-c0);
			
			ctx.moveTo(x0, y0+c0);
			ctx.lineTo(x0, cvs.height);
			
			ctx.moveTo(0, y0);
			ctx.lineTo(x0-c0, y0);
			
			ctx.moveTo(x0+c0, y0);
			ctx.lineTo(cvs.width, y0);
			// ctx.closePath();
			ctx.lineWidth = .5;	//з·ҡжўқзІ—еәҰ(зҙ°з·ҡ)
			ctx.strokeStyle = "block";	//жЎҶз·ҡйЎҸиүІ
			ctx.stroke();
			
						 
		let r3 = (dmWidth/sqrt2) ;
		
		ctx.beginPath();
		ctx.moveTo(x0, y0-r3);	//дёҠж–№
		ctx.lineTo(x0+r3, y0);
		ctx.lineTo(x0, y0+r3);
		ctx.lineTo(x0-r3, y0);
		ctx.closePath();
		
		ctx.lineWidth = 2;
		// ctx.strokeStyle = "silver";	//еЎ«ж»ҝиүІ
		ctx.stroke();
	}

}

draw.diamond = function (x0, y0, sftx=0,sfty=0){
			// console.log("ddm:",x0,y0);
		let border = .5;	//й–“йҡ”з”ЁжҜ”дҫӢеҸҜеҗҰ?

		let r5 = r3*2/15;	//йҖЈз·ҡй»‘ж јд№Ӣй–“зҡ„еҲ»еәҰй•·еәҰ
		ctx.beginPath();
		ctx.moveTo(x0, y0-r3);	//дёҠж–№

			ctx.moveTo(x0, y0+r3);//дёӢ

tools.getXYbyRC = function(raw, col){  //еҲ—иЎҢеҖјиҪүдёӯеӨ®еә§жЁҷ
	let r = dmWidth/sqrt2;
	let r2=r*2;
	let sftx = raw%2 * r;	//еҘҮж•ёиЎҢеҗ‘еҸіеҒҸз§»
	let x0= col * r2 - r+ sftx;
	let y0 = raw *r;

	let result={};
	result.x = x0;
	result.y = y0;
	return result;
}

tools.getColRaw=function(x0, y0){  //еә§жЁҷиҪүеҲ—иЎҢеҖј

	let r = dmWidth/sqrt2;
	let col = Math.trunc((x0+r/3)/r);
	col = Math.trunc((x0+r/3)/(r*2)) + col%2;
	
	//colеҘҮж•ёжҷӮ,y0иҰҒеҠ еҒҸз§»еҖј
	let raw = Math.trunc((y0+r/3)/r) ;
	// console.log(raw,col);
	let result={};
	result.col = col;
	result.raw = raw;
	return result;
}

		y1 = (y0-x0)/sqrt2;	//yзӮәиІ еҖј
		x1 = (x0 +y0)/ sqrt2;
		v = -1;	//ж”№зӮәMath.sign(y0-x0);
	}else{
		y1 = (y0-x0)/sqrt2;
		x1 = (y0 + x0)/sqrt2;
	}
	//еҸ–ж•ҙж•ёж ј
	x1 = Math.trunc(x1/w);
	x1 *= w;
	x1 += w/2;
	
	y1 = Math.trunc(y1/w);
	y1 *= w ;
	y1 += v * w/2;			
	// console.log(col,raw);
	//еҶҚиҪүеӣһдҫҶ
	if(y1 <0){
		x0 = (x1-y1) / sqrt2;
		y0 = (x1+y1)/sqrt2;
	}else{
		x0=(x1-y1)/sqrt2;
		y0=(x1+y1)/sqrt2;
	}

	let tar = {};
	tar.x = x0;
	tar.y = y0;
	return tar;
}
