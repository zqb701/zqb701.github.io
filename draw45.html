	// drawDiamond(100,100);

	function drawDiamond(x0, y0, sftx=0,sfty=0){
			// console.log("ddm:",x0,y0);
		let gap = 1;
		let r3 = dmWidth /sqrt2 - gap;
		ctx.beginPath();
		ctx.fillStyle = "black";	//填滿色
		ctx.moveTo(x0, y0-r3);
		ctx.lineTo(x0+r3, y0);
		ctx.lineTo(x0, y0+r3);
		ctx.lineTo(x0-r3, y0);
		ctx.closePath();
ctx.globalCompositeOperation ="xor";		//預設值"source-over"
		ctx.fill();
		ctx.globalCompositeOperation ="source-over";		//預設值"source-over"
	}
	

function drawCircle(x, y,r=4,r2=8,w=1, c="black"){	
			ctx.strokeStyle = c;	//線條色
		ctx.lineWidth = w;	//線條粗度
		ctx.beginPath();	

		
		y= ~~((y+r)/r2);
		y*= r2;
				x = ~~((x+r)/r2);
		x *= r2;

	
	ctx.rect(x-r,y-r,r*2,r*2);
		// ctx.arc(x,y,r,0,Math.PI*2,true);
ctx.fill();
}

var tools={};
tools.getXYbyRC = function(raw, col){  //列行值轉座標
	let r = dmWidth/sqrt2;
	let r2=r*2;
	let sftx = raw%2 * r;	//奇數行向右偏移
	let x0= col * r2 - r+ sftx;
	let y0 = raw *r;

	let result={};
	result.x = x0;
	result.y = y0;
	return result;
}

tools.getColRaw=function(x0, y0){  //座標轉列行值

	let r = dmWidth/sqrt2;
	let col = Math.trunc((x0+r/3)/r);
	col = Math.trunc((x0+r/3)/(r*2)) + col%2;
	
	//col奇數時,y0要加偏移值
	let raw = Math.trunc((y0+r/3)/r) ;
		let result={};
	result.col = col;
	result.raw = raw;
	return result;
}


tools.initArr = function(){
	/*取得暫存陣列或重置*/
	let dmdArrlocal = localStorage.getItem("dmdArr");
	// alert(dmdArrlocal);
	
	if(dmdArrlocal && dmdArrlocal !="[]"){

		// aArray[0][0] = "0";
		console.log("讀取陣列:" + aArray.length +"," + aArray[0].length);
		let p;
		for(let idxr=0;idxr<aArray.length;idxr++){
			for(let idxc=0;idxc<aArray[0].length;idxc++){
				// let bit = 
				if(aArray[idxr] && aArray[idxr][idxc] && aArray[idxr][idxc]== "1"){
					// console.log(idxr,idxc);
					p= tools.getXYbyRC(idxr,idxc);

				}
			}
		}
		
	}else{
		console.log("建立陣列");
		for(let raw=14; raw>=0; raw--){	//???另用小圖存放???
			aArray[raw]=new Array(10);
		}
	}
	
}


tools.setArr = function(src){  
/*指定的格點記錄為0或1*/
	let raw= src.raw;
	let col = src.col;
	
	if(col >= aArray[0].length){
		for(let idxr=0;idxr<aArray.length;idxr++){
			if(!aArray[idxr]){
				aArray[idxr] = new Array(aArray[0].length);
			}
				aArray[idxr].length = col;
			
		}
		console.log("add col to", col);
	}
	
	if(!aArray[raw]){
		aArray[raw] = new Array(aArray[0].length);
		// console.log("add raw to",raw);
	}
	
	
		if(aArray[raw][col]== undefined){
		aArray[raw][col] = 1;
	}else{
		if(aArray[raw][col] == 1){
			aArray[raw][col] = 0;
		}else{
			aArray[raw][col] = 1;	
		}
	}
	// console.log("RC=",raw,col,aArray[raw][col]);
}

tools.rotate45 = function(x, y, w){
	let x0=x,y0=y;
	let x1,y1;
//順轉45度後的座標
	let v = 1;
	if(x0 > y0){
		y1 = (y0-x0)/sqrt2;	//y為負值
		x1 = (x0 +y0)/ sqrt2;
		v = -1;	//改為Math.sign(y0-x0);
	}else{
		y1 = (y0-x0)/sqrt2;
		x1 = (y0 + x0)/sqrt2;
	}
	//取整數格
	x1 = Math.trunc(x1/w);
	x1 *= w;
	x1 += w/2;
	
	y1 = Math.trunc(y1/w);
	y1 *= w ;
	y1 += v * w/2;			
	// console.log(col,raw);
	//再轉回來
	if(y1 <0){
		x0 = (x1-y1) / sqrt2;
		y0 = (x1+y1)/sqrt2;
	}else{
		x0=(x1-y1)/sqrt2;
		y0=(x1+y1)/sqrt2;
	}

	let tar = {};
	tar.x = x0;
	tar.y = y0;
	return tar;
}
