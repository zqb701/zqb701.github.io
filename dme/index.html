	 draw.Cross=function(e){

		let cvs = e.target;
		let ctx = cvs.getContext("2d");
		let x0 = e.pageX;
		let y0 = e.pageY;// - cmdpanel.getBoundingClientRect().top;
		let c0 = dmWidth * 1.414 * 3 / 2;	//中間畫線空3格
			ctx.reset();
			
			let tar = tools.getColRaw(x0, y0);
			let cnt = tools.getXYbyRC(tar.raw, tar.col);
			x0 = cnt.x;
			y0 = cnt.y;			
			
			ctx.beginPath();
			ctx.moveTo(x0,0);
			ctx.lineTo(x0, y0-c0);
			
			ctx.moveTo(x0, y0+c0);
			ctx.lineTo(x0, cvs.height);
			
			ctx.moveTo(0, y0);
			ctx.lineTo(x0-c0, y0);
			
			ctx.moveTo(x0+c0, y0);
			ctx.lineTo(cvs.width, y0);
			// ctx.closePath();
			ctx.lineWidth = .5;	//線條粗度(細線)
			ctx.strokeStyle = "block";	//框線顏色
			ctx.stroke();
			
						 
		let r3 = (dmWidth/sqrt2) ;
		
		ctx.beginPath();
		ctx.moveTo(x0, y0-r3);	//上方
		ctx.lineTo(x0+r3, y0);
		ctx.lineTo(x0, y0+r3);
		ctx.lineTo(x0-r3, y0);
		ctx.closePath();
		
		ctx.lineWidth = 2;
		// ctx.strokeStyle = "silver";	//填滿色
		ctx.stroke();
	}


/*畫白格線*/
 draw.Grid=function(){
/* 先畫雙向細格線, 再單向蓋掉略小於格寬(刻度效果), 最後每5倍格寬畫粗細*/
	let r1 = dmWidth * 1.414;
	let r5 = r1*5;
	let w9 = Math.max(canvas.width, canvas.height);	//依較長邊畫正方形範圍
	w9 = (Math.trunc(w9/r5)+1) *r5;	//畫布長寬取格寬的整數
		
	ctx.lineWidth = 0.5;	//線條粗度(細線)
	ctx.strokeStyle = "Silver";	//框線顏色
	// let dash = [2, 4];
			// ctx.setLineDash(dash);		//虛線
			ctx.beginPath();
		for(let xa = 0; xa<w9; xa+=r1){


			ctx.moveTo(xa, 0);	//往右斜
			ctx.lineTo(w9, w9 - xa);
			ctx.moveTo(xa, w9);		//往右斜
			ctx.lineTo(0, w9-xa);

			ctx.moveTo(xa, 0);	//往左斜
			ctx.lineTo(0, xa);
			ctx.moveTo(xa, w9);		//往左斜
			ctx.lineTo(w9, xa);
			

		}
			ctx.stroke();
	// return;
	ctx.globalCompositeOperation = "destination-out";
		ctx.lineWidth = dmWidth*4/5;
						ctx.beginPath();
	for(let xa = r1/2; xa<w9; xa+=r1){

			// ctx.moveTo(xa, 0);	//往右斜
			// ctx.lineTo(w9, w9 - xa);			
			ctx.moveTo(xa, 0);	//往左斜
			ctx.lineTo(0, xa);
			
			// ctx.moveTo(xa, w9);		//往右斜
			// ctx.lineTo(0, w9-xa);
			ctx.moveTo(xa, w9);		//往左斜
			ctx.lineTo(w9, xa);
			// ctx.closePath();

}
			ctx.stroke();
	ctx.globalCompositeOperation ="source-over";
	/* 粗線雙向全畫*/
			// if(畫粗線){}else{break;}
	ctx.lineWidth = 1.5;		//(粗線)
				ctx.setLineDash([]);		//實線
		// for(let id = 1;id<6;id+=4){		//
					ctx.beginPath();
		for(let xa = 0; xa<w9; xa+=(r1*5)){


			ctx.moveTo(xa, 0);	//往右斜
			ctx.lineTo(w9, w9 - xa);
			ctx.moveTo(xa, w9);		//往右斜
			ctx.lineTo(0, w9-xa);

			ctx.moveTo(xa, 0);	//往左斜
			ctx.lineTo(0, xa);
			ctx.moveTo(xa, w9);		//往左斜
			ctx.lineTo(w9, xa);

		}
			ctx.stroke();
}
	
	
draw.diamond = function (x0, y0, sftx=0,sfty=0){
			// console.log("ddm:",x0,y0);
		let border = .5;	//間隔用比例可否?		 
		let r3 = dmWidth /sqrt2 + border;
		let r5 = r3*2/15;	//連線黑格之間的刻度長度
		ctx.beginPath();
		ctx.moveTo(x0, y0-r3);	//上方
		ctx.lineTo(x0+r3, y0);
		ctx.lineTo(x0, y0+r3);
		ctx.lineTo(x0-r3, y0);
		ctx.closePath();
		
		ctx.fillStyle = "gray";	//填滿色
		ctx.fill();
		
		if(document.getElementById("check1").checked){//畫框
			ctx.beginPath();
			
			ctx.moveTo(x0, y0-r3);	//上
			ctx.lineTo(x0+r3, y0);	//右
			// ctx.lineTo(x0+r3-r5, y0+r5);	//刻度,這個位置會被蓋掉,所以省略不畫
			
			ctx.moveTo(x0, y0+r3);//下
			ctx.lineTo(x0-r3, y0);//左
			ctx.lineTo(x0-r3+r5, y0-r5);//刻度
			
			// ctx.closePath();	//封閉曲線成為方塊
			ctx.lineWidth = 1.5;	//框線粗度
			ctx.strokeStyle = "Silver";	//框線條色
			ctx.stroke();
		}
	}

tools.nowByHHMM=function(colon=""){
	//colon冒號, 也可以放別的分隔符號
	let now = new Date();
	let strH = "" + now.getHours();
	/*
	用運算子補零
	(now.getMinutes()/10).toFixed() + (now.getMinutes()%10);
	用內建函式補零
	*/
	if(strH< 10){
		strH = "0"+ strH;
	}
	if(colon){
		strH += ":";
	}
	let strM = now.getMinutes();
	if(strM< 10){
		strM = "0"+ strM;
	}
	return strH + strM;
}

tools.getXYbyRC = function(raw, col){  //列行值轉中央座標
	let r = dmWidth/sqrt2;
	let r2=r*2;
	let sftx = raw%2 * r;	//奇數行向右偏移
	let x0= col * r2 - r+ sftx;
	let y0 = raw *r;

	let result={};
	result.x = x0;
	result.y = y0;
	return result;
}

tools.getColRaw=function(x0, y0){  //座標轉列行值

	let r = dmWidth/sqrt2;
	let col = Math.trunc((x0+r/3)/r);
	col = Math.trunc((x0+r/3)/(r*2)) + col%2;
	
	//col奇數時,y0要加偏移值
	let raw = Math.trunc((y0+r/3)/r) ;
	// console.log(raw,col);
	let result={};
	result.col = col;
	result.raw = raw;
	return result;
}

tools.rotate45 = function(x, y, w){
	let x0=x,y0=y;
	let x1,y1;
//順轉45度後的座標
	let v = 1;
	if(x0 > y0){
		y1 = (y0-x0)/sqrt2;	//y為負值
		x1 = (x0 +y0)/ sqrt2;
		v = -1;	//改為Math.sign(y0-x0);
	}else{
		y1 = (y0-x0)/sqrt2;
		x1 = (y0 + x0)/sqrt2;
	}
	//取整數格
	x1 = Math.trunc(x1/w);
	x1 *= w;
	x1 += w/2;
	
	y1 = Math.trunc(y1/w);
	y1 *= w ;
	y1 += v * w/2;			
	// console.log(col,raw);
	//再轉回來
	if(y1 <0){
		x0 = (x1-y1) / sqrt2;
		y0 = (x1+y1)/sqrt2;
	}else{
		x0=(x1-y1)/sqrt2;
		y0=(x1+y1)/sqrt2;
	}

	let tar = {};
	tar.x = x0;
	tar.y = y0;
	return tar;
}

cmd.saveFile = function (fileName="1234.dm1") {
	tools.hidctl();
	tools.trim();
	cmd.swPen(3);
	let content =  JSON.stringify(aArray);
	localStorage.setItem("dmdArr",content);	//暫存編輯資料
	
	content = content.replaceAll("null", "0");	//陣列在json的空元素為null,置換以縮小檔案
	// 1. 建立 Blob 物件 (內容, 類型)
  const blob = new Blob([content], { type: 'text/dm1' });	//type要指定副檔名,否則某些app會再加上「.TXT」
  // 2. 建立下載連結
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);  
  a.download = fileName; // 設定檔名

  // 3. 模擬點擊並移除
  a.click();
  URL.revokeObjectURL(a.href); // 釋放記憶體
}
